<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE | Premium Mental Wellness</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FCFAF7; /* Premium Alabaster */
            --white: #FFFFFF;
            --sage-accent: #7A9473;
            --sage-glow: rgba(122, 148, 115, 0.15);
            --text-dark: #1A2419;
            --text-light: #606C5D;
            --border: #E5EADD;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background lighting */
        body::before {
            content: '';
            position: absolute;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--sage-glow) 0%, rgba(252,250,247,0) 70%);
            top: -20%;
            right: -10%;
            z-index: -1;
        }

        .main-card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            text-align: center;
            position: relative;
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-mark {
            width: 64px;
            height: 64px;
            background: var(--sage-accent);
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px var(--sage-glow);
        }

        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        p {
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* The "Killer" Link Button */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--text-dark);
            color: var(--white);
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .download-btn:hover {
            transform: scale(1.03);
            background: var(--sage-accent);
            box-shadow: 0 15px 30px var(--sage-glow);
        }

        .download-btn span {
            margin-left: 10px;
            opacity: 0.6;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .install-guide {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-light);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .install-guide:hover {
            opacity: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Responsive */
        @media (max-width: 500px) {
            .main-card { padding: 40px 24px; width: 92%; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="logo-mark">S</div>
        <h1>Elevate your mind.</h1>
        <p>Experience the world’s most intuitive mental health companion. Designed for clarity, built for you.</p>
        <a href="https://github.com/sahaymochan/sahaymochan.github.io/releases/download/v1.0/mochanapp-debug.apk" class="download-btn" id="mainLink">
            Get the APK <span>(24.8MB)</span>
        </a>

        <div class="install-guide" onclick="showHelp()">
            How to install on Android?
        </div>
    </div>

    <script>
        function showHelp() {
            alert("1. Click Download\n2. Open the file\n3. Select 'Settings' if prompted\n4. Toggle 'Allow from this source'");
        }

        // Smooth click feedback
        document.getElementById('mainLink').addEventListener('click', function(e) {
            if(this.getAttribute('href') === 'your-app-file.apk') {
                console.log("Premium Download Initialized");
            }
        });
    </script>
</body>
</html>
